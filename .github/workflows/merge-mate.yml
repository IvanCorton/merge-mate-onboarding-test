name: Merge Mate Sync
on:
  push:
    branches: [main]
concurrency:
  group: merge-mate-sync-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: gitkraken/merge-mate-action/sync@v0.3
        with:
          ai-api-key: ${{ secrets.MERGE_MATE_API_KEY }}
